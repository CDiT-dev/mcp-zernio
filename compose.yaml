services:
  mcp-zernio:
    build: .
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8717}:8717"
    environment:
      - ZERNIO_API_KEY=${ZERNIO_API_KEY:-}
      - MCP_ZERNIO_API_KEY=${MCP_ZERNIO_API_KEY:-}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER:-}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE:-mcp-zernio}
      - MCP_TRANSPORT=http
      - HOST=0.0.0.0
      - PORT=8717
