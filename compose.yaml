services:
  mcp-zernio:
    build: .
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8717}:8717"
    environment:
      - ZERNIO_API_KEY=${ZERNIO_API_KEY:-}
      - MCP_ZERNIO_API_KEY=${MCP_ZERNIO_API_KEY:-}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER:-}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE:-mcp-zernio}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-mcp-zernio}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - MCP_TRANSPORT=http
      - HOST=0.0.0.0
      - PORT=8717
      - FASTMCP_HOME=/data/fastmcp
    volumes:
      - fastmcp-data:/data/fastmcp

volumes:
  fastmcp-data:
