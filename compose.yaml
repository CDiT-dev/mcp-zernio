services:
  mcp-zernio:
    build: .
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8717}:8717"
    environment:
      - ZERNIO_API_KEY=${ZERNIO_API_KEY:-}
      - MCP_API_KEY=${MCP_API_KEY:-}
      - MCP_TRANSPORT=http
      - HOST=0.0.0.0
      - PORT=8717
      - FASTMCP_HOME=/data/fastmcp
      - INBOX_PASSPHRASE=${INBOX_PASSPHRASE:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - INBOX_EMAIL=${INBOX_EMAIL:-}
    volumes:
      - fastmcp-data:/data/fastmcp

volumes:
  fastmcp-data:
